<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Receitas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Calculadora de Receitas</h1>

<div class="container">
  <h2>Nova Receita</h2>

  <input type="text" id="nomeReceita" placeholder="Nome da receita">
  
  <textarea id="modoPreparo" placeholder="Modo de preparo"></textarea>

  <input type="number" id="porcoesBase" placeholder="Porções base">

  <h3>Ingredientes</h3>

  <input type="text" id="ingrediente" placeholder="Ingrediente">
  <input type="number" id="quantidade" placeholder="Quantidade">

  <button id="btnAdicionar">Adicionar Ingrediente</button>

  <div id="ingredientesTemp"></div>

  <button id="btnSalvar">Salvar Receita</button>
</div>

<hr>
<h2>Receitas Salvas</h2>
<div id="listaReceitas"></div>

<hr>
<h2>Visualizar Receita</h2>
<div id="visualizarReceita"></div>
</body>
</html>
